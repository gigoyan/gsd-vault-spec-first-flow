profile_id = "backend-nodejs-service"
display_name = "Node.js Backend Service"
domain = "backend"
status = "active"
version = "2026-04-19"
summary = "Curated Node.js backend profile for APIs, webhooks, and background jobs. It favors Active LTS or Maintenance LTS Node.js releases, explicit module-system markers, built-in Node testing where practical, non-blocking request paths, and project-specific variant selection for authoring mode, architecture, HTTP framework, and repository shape."
owners = ["GSD blueprint maintainers"]
last_reviewed = "2026-04-19"

best_for = [
  "I/O-bound APIs and web services",
  "Webhook consumers and integration services",
  "Background workers and scheduled jobs",
  "Teams that want one runtime across service code and tooling"
]

avoid_when = [
  "CPU-heavy workloads that cannot be partitioned or offloaded",
  "Hard real-time systems",
  "Projects that need one opinionated full-stack framework instead of a backend runtime profile"
]

prerequisites = [
  "Use an Active LTS or Maintenance LTS Node.js release for production targets",
  "Declare runtime expectations in package.json",
  "Choose an explicit authoring mode instead of relying on Node's auto-detection defaults",
  "Define package scripts for dev, test, lint, and build or typecheck workflows"
]

compatibility_notes = [
  "This profile is runtime-first and can support plain JavaScript or TypeScript authoring",
  "HTTP framework choice is optional when the service is a worker, CLI, or job runner",
  "Repository shape can remain single-package until shared packages or multiple deployables justify workspaces"
]

recommended_architecture_baseline = "Start with a feature-first modular monolith. Keep transport adapters thin, business logic out of route handlers, and I/O boundaries explicit."
recommended_project_structure = "Default to a single service package with src/app, src/config, src/modules, src/shared, and test/. Move to npm workspaces only when there is a real need for multiple packages."
testing_baseline = [
  "Use node:test for unit and integration seams when the repo does not already standardize on another runner",
  "Keep fast unit tests close to modules and broader integration tests under test/integration",
  "Test transport boundaries, validation, and failure paths, not only happy-path services"
]

tooling_baseline = [
  "Use package.json scripts as the control plane for setup, dev, test, lint, and build or typecheck commands",
  "Use explicit ESM or CommonJS markers in package.json and file extensions when needed",
  "Use built-in .env support and process.env for environment-driven configuration",
  "Use ESLint with recommended safety rules when linting is enabled",
  "Use TypeScript NodeNext mode when the TypeScript variant is selected"
]

operational_baseline = [
  "Do not block the event loop or worker pool on request paths",
  "Use structured logging and request-scoped context when the selected framework supports it",
  "Use process supervision or the host init system instead of assuming the process should never crash",
  "Expose the Node inspector only on localhost during development or through a secure tunnel"
]

style_baseline = [
  "Prefer async and await in application code",
  "Prefer small single-purpose modules",
  "Validate input at the transport boundary and normalize errors before returning responses",
  "Keep reusable business logic independent of framework request and response objects",
  "Prefer named exports for reusable internal modules unless a framework convention strongly prefers otherwise"
]

naming_baseline = [
  "Environment variables use UPPER_SNAKE_CASE",
  "Feature folders use domain-oriented names",
  "Scripts in package.json use stable verbs like dev, test, lint, build, typecheck, and start",
  "Tests mirror the feature or module they verify"
]

error_handling_baseline = [
  "Handle errors as close to the failure site as practical",
  "Do not rely on uncaughtException to keep a production process alive",
  "Convert framework or transport errors into one service-level error contract at the boundary"
]

dependency_baseline = [
  "Prefer the smallest dependency that solves the actual problem",
  "Do not introduce framework dependencies into core business logic modules",
  "Keep generated clients, SDK wrappers, and database adapters behind explicit interfaces"
]

documentation_baseline = [
  "Document public routes, jobs, queues, and environment variables",
  "Use comments to explain non-obvious behavior, not obvious syntax",
  "Keep architecture decisions in spec artifacts instead of scattered inline comments"
]

selection_prompt = "Select the Node.js backend profile options that match the project's delivery needs."
selection_help = "The choices below control how the Node.js service is authored, structured, validated, and later specialized for the selected agent runtime."
comparison_rules = [
  "Prefer the simplest option that matches the expected service size and team skill",
  "Choose hexagonal only when adapter boundaries and long-term swapability matter enough to justify extra ceremony",
  "Choose workspaces only when you truly have multiple packages or deployables to maintain"
]

[[recommendation_sets]]
recommendation_id = "http-api-defaults"
label = "Default Node.js HTTP API"
status = "active"
priority = "primary"
when_to_suggest = [
  "Repo evidence or explicit user intent confirms a Node.js HTTP API or webhook service",
  "No repo-proven requirement already forces CommonJS, Express, workspaces, or a non-HTTP runtime shape",
  "The current project wants the lowest-ceremony recommended combination"
]
not_when = [
  "The repo already proves a different authoring mode, framework, or repository shape that the user is keeping",
  "The spec or user explicitly prioritizes legacy middleware compatibility over the recommended default path",
  "The service is worker-only and does not expose HTTP routes"
]
rationale = "For a typical Node.js API, JavaScript ESM plus a feature-first modular monolith, Fastify, and a single package keeps the stack modern and lightweight while still leaving explicit room for later overrides."
tradeoffs = [
  "Schema-first Fastify usage adds some up-front route-definition work",
  "JavaScript ESM relies on runtime validation and tests instead of compile-time type checking",
  "Single-package discipline matters as the service grows"
]
suggested_convention_ids = [
  "thin-route-handlers",
  "schema-at-boundary",
  "package-scripts-control-plane"
]
override_prompt = "If the project needs TypeScript, Express middleware compatibility, a worker-only runtime, or multiple packages, confirm the override explicitly instead of silently dropping the recommendation."
deferred_follow_on = [
  "Later freshness review can re-check the current Node.js, Fastify, and npm guidance",
  "Later project-local generation can derive runtime instruction and adapter overlays from the confirmed options"
]

[[recommendation_sets.recommended_axis_options]]
axis_id = "authoring_mode"
option_id = "javascript-esm"
reason = "Modern Node.js services can stay low-ceremony with explicit ESM markers when there is no confirmed TypeScript or CommonJS constraint."

[[recommendation_sets.recommended_axis_options]]
axis_id = "service_architecture"
option_id = "feature-first-layered"
reason = "Feature-first structure is the best general-purpose default for modular Node.js services without the extra ceremony of strict layers or hexagonal ports."

[[recommendation_sets.recommended_axis_options]]
axis_id = "http_framework"
option_id = "fastify"
reason = "Fastify fits the default API case when the project benefits from schema-aware transport boundaries and strong built-in operational ergonomics."

[[recommendation_sets.recommended_axis_options]]
axis_id = "repo_shape"
option_id = "single-package-service"
reason = "One package is the clearest default until the spec or repo proves the need for workspaces."

[[convention_overlays]]
convention_id = "thin-route-handlers"
label = "Thin Route Handlers"
summary = "Keep route modules focused on transport validation, response shaping, and delegation into service logic."
applies_when = [
  "An HTTP framework option is selected",
  "The service exposes HTTP APIs or webhooks"
]
guidance = [
  "Validate and normalize requests at the route boundary",
  "Delegate business decisions to service modules instead of embedding them in handlers",
  "Keep framework request and response objects out of reusable business logic"
]
output_implications = [
  "Generated route guidance should emphasize transport-edge boundaries and service delegation",
  "Later review overlays should flag handlers that contain business logic"
]
deferred_follow_on = [
  "Project-local output generation may turn this into AGENTS or review checklist fragments later"
]

[[convention_overlays]]
convention_id = "schema-at-boundary"
label = "Schema At Boundary"
summary = "Keep request and response contracts explicit at the transport edge, especially for Fastify-backed APIs."
applies_when = [
  "The selected HTTP framework is Fastify",
  "The service exposes HTTP APIs with request or response payloads"
]
guidance = [
  "Keep validation close to routes",
  "Review request and response shapes together instead of scattering them across unrelated modules",
  "Treat schema drift as a transport-boundary concern"
]
output_implications = [
  "Later generated route templates may include schema placeholders",
  "Later review overlays may check response-schema coverage"
]
deferred_follow_on = [
  "Project-local generation and freshness review remain outside the active selection step"
]

[[convention_overlays]]
convention_id = "package-scripts-control-plane"
label = "Package Scripts Control Plane"
summary = "Use package.json scripts as the stable control plane for development, test, lint, and build or typecheck commands."
applies_when = [
  "The project uses the Node.js backend profile",
  "The repository exposes a package.json-based workflow"
]
guidance = [
  "Standardize on stable script verbs such as dev, test, lint, build, and typecheck",
  "Route automation and agent guidance through scripts instead of ad hoc shell snippets",
  "Keep verification entry points discoverable from package.json"
]
output_implications = [
  "Later generated AGENTS fragments may reference stable script names",
  "Later project-local config may derive default verification commands from package.json scripts"
]
deferred_follow_on = [
  "Project-local command generation remains deferred until stack selection and the technical specification are current"
]

