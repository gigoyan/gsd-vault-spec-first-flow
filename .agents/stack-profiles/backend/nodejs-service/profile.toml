  "Choose JavaScript ESM for the lowest ceremony modern Node baseline",
  "Choose TypeScript when type safety and editor tooling justify a compile or typecheck step",
  "Choose CommonJS only for legacy ecosystem compatibility or strong existing constraints"
]

[[variant_axes]]
