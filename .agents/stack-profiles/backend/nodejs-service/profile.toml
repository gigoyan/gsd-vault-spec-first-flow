[[variant_options]]
option_id = "javascript-esm"
axis_id = "authoring_mode"
label = "JavaScript (ESM)"
status = "active"
recommended = true
short_description = "Use modern JavaScript with native import and export and an explicit ESM marker."
best_for = [
  "Most new Node.js services",
  "Teams that want the smallest toolchain",
  "Projects that do not need a TypeScript compile step"
]
avoid_when = [
  "The team requires compile-time type checking",
  "A critical dependency is still tightly bound to CommonJS-only patterns"
]
main_tradeoffs = [
  "Less static type safety than TypeScript",
  "Requires discipline around runtime validation and tests"
]
example = "package.json -> { \"type\": \"module\" }\nsrc/server.js -> import Fastify from 'fastify'"
non_technical_explanation = "This is the simplest modern option. You write JavaScript directly and Node runs it without a compile step."
architecture_effects = [
  "No build boundary is required for ordinary service code",
  "Generated guidance should prefer explicit package.json module markers"
]
structure_effects = [
  "Use .js files with explicit import paths",
  "Keep transpile-only folders out of the default layout"
]
tooling_effects = [
  "No TypeScript compile step",
  "Linting and tests can run directly against source"
]
code_style_effects = [
  "Prefer async and await and named exports",
  "Use JSDoc only when it materially improves clarity or editor help"
]
skill_effects = [
  "Generate the general node-backend-implementation skill",
  "Do not generate TypeScript-specific build guidance by default"
]
config_effects = [
  "Default build command may be empty or omitted",
  "Default verification commands emphasize node:test and lint"
]
prerequisites = [
  "package.json contains an explicit ESM marker"
]
incompatible_with = []
follow_up_questions = []
source_refs = [
  "https://nodejs.org/api/esm.html",
  "https://docs.npmjs.com/cli/v11/configuring-npm/package-json"
]
last_reviewed = "2026-04-19"

